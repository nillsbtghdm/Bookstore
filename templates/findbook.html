{% extends 'layout.html' %}

{% block content %}
<style>
    table, th , td  {
      border:1px solid #340909;
      margin: 50px;
     text-align: center;
    }
    </style>
  

<div id="find-book">
    <h2 style="
    color:white;
        margin-bottom: 20px;
        font-weight: bold;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);margin-bottom: 20px; text-align: left;">
        Find Book</h2>
    <form method="post">
        <input type="text" name="isbn" placeholder="Enter ISBN" required>
        <button type="submit">Find Book</button>
    </form>
    {% if book %}
      <table style="width:60%;background-color: black;color:white"">
            <tr>
            <th>ISBN</th>
            <th>Title</th>
            <th>Author</th>
            <th>Price</th>
            <th>Page</th>
        </tr>
        <tr>
            <td>{{book[0]}}</td>
            <td>{{book[1]}}</td>
            <td>{{book[2]}}</td>
            <td>{{book[3]}}</td>
            <td>{{book[4]}}</td>
        </tr>
    {% elif book is none %}
       <p style="color: white;">Book has not been found!</p>
    {% endif %}
    </table>
</div>
{% endblock %}
